<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angelo Moshopoulos | Dental Surgeon</title>
    <!-- Favicon -->
    <link rel="icon" href="icons/dental-implant-circle-256-torqued.png" type="image/png">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Meta -->
    <meta name="description" content="Official info page of Angelo Moshopoulos, Dental Surgeon.">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Style -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <button id="lang-toggle-btn" class="lang-toggle">English</button>

    <div class="app-container">
        <header>
            <div class="brand-wrapper">
                <div class="profile-img-frame">
                    <img src="icons/dental-implant-circle-256-torqued.png" alt="Dental Surgeon Logo">
                </div>
            </div>
            <div class="header-text">
                <h1 id="display-name">Αγγελος Μοσχοπουλος</h1>
                <p id="display-title" class="subtitle">Χειρουργός Οδοντίατρος</p>
            </div>
        </header>

        <main class="links-grid">
            <a href="data/contacts.vcf" class="link-item featured" data-translate="download">
                <div class="icon-box"><i class="fa-solid fa-address-card"></i></div>
                Λήψη επαφής
            </a>

            <a href="tel:+302109312651" class="link-item" data-translate="phone">
                <div class="icon-box"><i class="fa-solid fa-phone"></i></div>
                Τηλέφωνο ιατρείου
            </a>

            <a href="https://www.dentplant.gr/booking.html" target="_blank" class="link-item"
                data-translate="appointment">
                <div class="icon-box"><i class="fa-solid fa-calendar-check"></i></div>
                Κλείστε ραντεβού
            </a>

            <a href="mailto:angelo.moshopoulos@gmail.com" class="link-item" data-translate="email">
                <div class="icon-box"><i class="fa-solid fa-envelope"></i></div>
                Email
            </a>

            <a href="https://www.dentplant.gr/" target="_blank" class="link-item" data-translate="website_dentplant">
                <div class="icon-box"><i class="fa-solid fa-globe"></i></div>
                Website: dentplant.gr
            </a>

            <a href="https://www.i-smile.gr" target="_blank" class="link-item" data-translate="website_ismile">
                <div class="icon-box"><i class="fa-solid fa-tooth"></i></div>
                Website: i-smile.gr
            </a>
        </main>
    </div>

    <!-- App Logic -->
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }
    </script>
</body>

</html>
